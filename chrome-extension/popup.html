<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #333;
      background: #fafafa;
    }
    h1 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #1a1a1a;
    }
    .status {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
    }
    .status-label { color: #666; }
    .status-value { font-weight: 600; }
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .dot.green { background: #22c55e; }
    .dot.red { background: #ef4444; }
    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #666;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 8px;
      outline: none;
    }
    input:focus { border-color: #4f46e5; }
    button {
      width: 100%;
      padding: 8px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #4338ca; }
    .btn-secondary {
      background: #f3f4f6;
      color: #333;
      margin-top: 6px;
    }
    .btn-secondary:hover { background: #e5e7eb; }
    .msg {
      font-size: 11px;
      color: #22c55e;
      margin-top: 4px;
      display: none;
    }
  </style>
</head>
<body>
  <h1>📰 PaperBack Agent</h1>

  <div class="status">
    <div class="status-row">
      <span class="status-label">상태</span>
      <span class="status-value" id="connectionStatus">
        <span class="dot red"></span>연결 안 됨
      </span>
    </div>
    <div class="status-row">
      <span class="status-label">오늘 수집</span>
      <span class="status-value" id="todayCollected">0건</span>
    </div>
    <div class="status-row">
      <span class="status-label">오늘 전송</span>
      <span class="status-value" id="todaySent">0건</span>
    </div>
    <div class="status-row">
      <span class="status-label">대기 중</span>
      <span class="status-value" id="pendingCount">0건</span>
    </div>
  </div>

  <div id="loggedOut">
    <button id="loginBtn">Google로 로그인</button>
    <p style="font-size:11px;color:#999;margin-top:8px;text-align:center;">로그인하면 데이터 수집이 시작됩니다</p>
  </div>

  <div id="loggedIn" style="display:none">
    <div style="font-size:12px;color:#555;margin-bottom:8px;" id="userEmail"></div>
    <button id="sendNowBtn">지금 전송하기</button>
    <button class="btn-secondary" id="logoutBtn">로그아웃</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
