app = "paperback-agent"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "60s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "20s"

[[vm]]
  # 자동 인쇄가 헤드리스 크로미움(Playwright)을 띄우면서 uvicorn+celery와 같이 도니까
  # 512mb로는 OOM 날 수 있어서 1024mb로 올림. (자동 인쇄 안 쓰면 512mb로 되돌려도 됨)
  memory = "1024mb"
  cpu_kind = "shared"
  cpus = 1
  count = 1
